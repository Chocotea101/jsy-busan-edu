<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카드뉴스 · 정승윤 부산교육감 후보</title>
<meta name="description" content="정승윤 부산시교육감 후보의 정책 카드뉴스 — 공약별 핵심 메시지와 후보 시리즈 카드를 한곳에서.">
<meta name="theme-color" content="#E60012">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="assets/css/style.css?v=2">
</head>
<body class="cards-page">

<header class="site-header">
  <div class="container">
    <div class="brand"><a href="index.html">정승윤 · <span class="brand-red">부산교육감</span></a></div>
    <nav class="nav" aria-label="주요 메뉴">
      <a href="index.html#vision">비전</a>
      <a href="pledges.html">공약</a>
      <a href="cards.html">카드뉴스</a>
      <a href="activities.html">활동사진</a>
      <a href="songs.html">영상</a>
      <a href="index.html#about">후보소개</a>
      <a href="book.html">책자</a>
    </nav>
    <div id="admin-slot" class="admin-slot"></div>
  </div>
</header>

<section style="padding-top:28px; padding-bottom:64px;">
  <div class="container">
    <div class="section-head">
      <span class="section-eyebrow">Cards</span>
      <h1 class="section-title">정승윤 카드뉴스</h1>
      <p class="section-lead">공약별 정책 카드와 후보 시리즈 카드를 좌우로 넘기며 살펴보세요.</p>
    </div>

    <!-- 큰 모드 토글 -->
    <div class="cards-mode" role="tablist" aria-label="카드 종류">
      <button data-mode="policy" class="is-active">정책 카드</button>
      <button data-mode="series">시리즈 카드</button>
      <button data-mode="recent">신규 카드</button>
    </div>

    <!-- 관리자 툴바 (신규 카드 모드일 때만 노출) -->
    <div id="cards-admin-toolbar"></div>

    <!-- 하위 탭 (공약 1~6 또는 시리즈 1~2) -->
    <div class="cards-tabs" id="cards-tabs"></div>

    <!-- 카드 슬라이드 영역 -->
    <div class="cards-stage" id="cards-stage"></div>

    <!-- 카드 클릭 시 확대 라이트박스 -->
    <div class="cards-lightbox" id="cards-lightbox" role="dialog" aria-modal="true" aria-label="카드 크게 보기">
      <button class="cl-close" id="cl-close" aria-label="닫기">✕</button>
      <button class="cl-arrow cl-prev" id="cl-prev" aria-label="이전 카드">←</button>
      <button class="cl-arrow cl-next" id="cl-next" aria-label="다음 카드">→</button>
      <div class="cl-stage">
        <img id="cl-img" alt="">
      </div>
      <div class="cl-counter" id="cl-counter"></div>
    </div>

    <div style="text-align:center; margin-top:36px;">
      <a href="index.html" class="btn btn-ghost">← 메인으로</a>
      <a href="pledges.html" class="btn btn-outline" style="margin-left:8px;">공약 상세 보기</a>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <strong>2026 부산광역시교육감선거 후보 정승윤</strong>
    <div class="ft-links">
      <a href="index.html#pledges">공약</a>
      <a href="cards.html">카드뉴스</a>
      <a href="activities.html">활동사진</a>
      <a href="songs.html">영상</a>
      <a href="index.html#about">후보소개</a>
      <a href="book.html">책자형 공보</a>
    </div>
  </div>
</footer>

<button class="back-to-top" id="back-to-top" aria-label="맨 위로 이동" title="맨 위로">↑</button>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="assets/js/admin.js?v=2"></script>
<script src="assets/js/cards.js?v=2"></script>
<script src="assets/js/common.js?v=2"></script>
</body>
</html>
