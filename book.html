<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>책자형 선거공보 · 정승윤 부산교육감 후보</title>
<meta name="description" content="정승윤 부산시교육감 후보의 책자형 선거공보 12페이지를 책처럼 펼쳐서 봅니다.">
<meta name="theme-color" content="#18181b">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="book-page">

<div class="book-bar">
  <a href="index.html">← 메인으로</a>
  <strong style="font-size:14px;">정승윤 · 책자형 선거공보</strong>
  <a href="pledges.html">공약 보기</a>
</div>

<div class="book-stage">
  <div id="book-loader" class="book-loader">
    <div class="bl-spinner" aria-hidden="true"></div>
    <div class="bl-text">책자를 불러오는 중…</div>
    <div class="bl-bar"><div class="bl-bar-fill"></div></div>
  </div>
  <div id="flipbook"></div>
</div>

<div class="book-controls">
  <button id="prev" aria-label="이전 페이지">←</button>
  <span class="book-pageinfo" id="pageinfo">1 / 11</span>
  <button id="next" aria-label="다음 페이지">→</button>
  <button id="zoom" class="book-zoom-btn" aria-label="현재 페이지 크게 보기" title="크게 보기">
    <span aria-hidden="true">🔍</span> 크게 보기
  </button>
</div>

<p class="book-hint">페이지 모서리를 끌어서 넘기거나 좌·우 화살표·키보드를 사용하세요. 글씨가 작으면 <strong>크게 보기</strong> 버튼을 눌러주세요.</p>

<!-- 페이지 확대 라이트박스 (카루셀 + 줌 컨트롤) -->
<div class="book-lightbox" id="book-lightbox" role="dialog" aria-modal="true" aria-label="페이지 크게 보기">
  <button class="bl-close" id="bl-close" aria-label="닫기">✕</button>

  <!-- 줌 컨트롤 (상단 중앙) -->
  <div class="bl-zoom-controls">
    <button class="bl-zoom-btn" id="bl-zoom-out" aria-label="축소">−</button>
    <button class="bl-zoom-level" id="bl-zoom-level" aria-label="원래 크기로">100%</button>
    <button class="bl-zoom-btn" id="bl-zoom-in" aria-label="확대">+</button>
  </div>

  <button class="bl-arrow bl-prev" id="bl-prev" aria-label="이전 페이지">←</button>
  <button class="bl-arrow bl-next" id="bl-next" aria-label="다음 페이지">→</button>
  <div class="bl-carousel" id="bl-carousel"></div>
  <div class="bl-counter" id="bl-counter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script src="assets/js/book.js"></script>
<script src="assets/js/common.js"></script>
</body>
</html>
